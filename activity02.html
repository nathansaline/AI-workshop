<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity Prompt Builder</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #10b981;
      --accent-hover: #059669;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 24px; line-height: 1.5; }
    .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
    
    .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    h2 { margin-bottom: 18px; font-size: 1.25rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.875rem; color: var(--text); }
    input[type="text"], select, textarea { width: 100%; padding: 10px 14px; background: #0f172a; color: #f8fafc; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
    input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    textarea { resize: vertical; min-height: 75px; }
    
    .checkbox-group { display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer; color: var(--text); }
    .checkbox-group input { width: 18px; height: 18px; accent-color: var(--accent); }
    
    .output-box { width: 100%; height: 380px; background: #020617; color: #38bdf8; font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; padding: 14px; border: 1px solid var(--border); border-radius: 6px; overflow-y: auto; white-space: pre-wrap; margin-bottom: 16px; }
    
    button { background: var(--accent); color: #020617; border: none; padding: 12px 20px; font-weight: 700; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s, transform 0.1s; text-transform: uppercase; letter-spacing: 0.5px; }
    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.99); }
    .copied-badge { font-size: 0.75rem; color: var(--accent); display: none; }
  </style>
</head>
<body>

<div class="container">
  <!-- Input Form -->
  <div class="panel">
    <h2>Cybersecurity Configuration</h2>
    
    <div class="form-group">
      <label for="topic">Course Topic</label>
      <input type="text" id="topic" value="Network Defense & Firewall Configuration">
    </div>

    <div class="form-group">
      <label for="persona">Expert Persona / Role</label>
      <select id="persona">
        <option value="Cybersecurity Subject Matter Expert (SME)">Cybersecurity SME</option>
        <option value="Instructional Designer" selected>Instructional Designer</option>
        <option value="Web Developer (EdTech & Labs)">Web Developer</option>
        <option value="ADA & Accessibility Expert">ADA Expert</option>
      </select>
    </div>

    <div class="form-group">
      <label for="activity">Activity Type</label>
      <select id="activity">
        <option value="Incident Response Tabletop Exercise">1. Incident Response Tabletop Exercise</option>
        <option value="Wireshark / Packet Analysis Lab">2. Wireshark / Packet Analysis Lab</option>
        <option value="Log Analysis Challenge">3. Log Analysis Challenge</option>
        <option value="Threat Modeling & Risk Assessment">4. Threat Modeling & Risk Assessment</option>
        <option value="Vulnerability Assessment Report">5. Vulnerability Assessment Report</option>
        <option value="Social Engineering Attack Design">6. Social Engineering Attack Design</option>
        <option value="Security Policy Drafting">7. Security Policy Drafting</option>
        <option value="CTF (Capture The Flag) Challenge Brief">8. CTF Challenge Brief</option>
        <option value="Secure Code Audit">9. Secure Code Audit</option>
        <option value="Network Topology Defense Map">10. Network Topology Defense Map</option>
        <option value="Security Awareness Campaign Brief">11. Security Awareness Campaign Brief</option>
        <option value="Malware Behavior Sandbox Report">12. Malware Behavior Sandbox Report</option>
      </select>
    </div>

    <div class="form-group">
      <label for="objectives">Learning Objectives</label>
      <textarea id="objectives">Analyze firewall logs and write inbound/outbound rules to mitigate an active SYN flood attack.</textarea>
    </div>

    <div class="form-group">
      <label for="concepts">Major Concepts Included</label>
      <textarea id="concepts">TCP/IP 3-Way Handshake, Firewall Rulesets, Denial of Service (DoS), Statefulness, IP Filtering.</textarea>
    </div>

    <div class="form-group">
      <label class="checkbox-group">
        <input type="checkbox" id="ada" checked>
        Enforce ADA / Universal Design Directives
      </label>
    </div>
  </div>

  <!-- Prompt Output -->
  <div class="panel">
    <h2>
      Target LLM Prompt
      <span class="copied-badge" id="copiedBadge">✓ Copied to clipboard</span>
    </h2>
    <div class="output-box" id="promptOutput"></div>
    <button onclick="copyPrompt()">Copy Generated Prompt</button>
  </div>
</div>

<script>
  function updatePrompt() {
    const topic = document.getElementById('topic').value;
    const persona = document.getElementById('persona').value;
    const activity = document.getElementById('activity').value;
    const objectives = document.getElementById('objectives').value;
    const concepts = document.getElementById('concepts').value;
    const isADA = document.getElementById('ada').checked;

    let promptText = `Act as an expert ${persona} crafting educational content for a Community College Cybersecurity course.\n\n`;
    promptText += `### Context & Scope\n`;
    promptText += `- Topic: ${topic}\n`;
    promptText += `- Activity Format: ${activity}\n`;
    promptText += `- Core Concepts: ${concepts}\n`;
    promptText += `- Target Audience: Community College Students (varied technical background, career changers, entry-level IT)\n\n`;
    
    promptText += `### Learning Objectives\n${objectives}\n\n`;
    
    promptText += `### Activity Deliverables & Structure\n`;
    promptText += `Develop a ready-to-deploy "${activity}" activity for students.\n`;
    promptText += `- Provide step-by-step instructions with real-world industry scenarios.\n`;
    promptText += `- Include realistic sample data (e.g., mock log entries, code snippets, network packets, or policy templates) where applicable.\n`;
    promptText += `- Provide a student submission sheet and an Instructor Answer Key with grading criteria.\n\n`;

    if (isADA) {
      promptText += `### ADA & Universal Design for Learning (UDL) Directives\n`;
      promptText += `- Provide text-based representations (descriptions) for all network diagrams, topologies, and screenshot mockups.\n`;
      promptText += `- Structure code/log blocks using high-contrast text and explicit labels rather than relying solely on visual syntax highlighting.\n`;
      promptText += `- Maintain semantic heading tags (H2, H3), descriptive link anchor texts, and clear step-by-step screen-reader-friendly formatting.\n\n`;
    }

    promptText += `Please generate the complete cybersecurity activity now.`;

    document.getElementById('promptOutput').innerText = promptText;
  }

  function copyPrompt() {
    const text = document.getElementById('promptOutput').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const badge = document.getElementById('copiedBadge');
      badge.style.display = 'inline';
      setTimeout(() => { badge.style.display = 'none'; }, 2000);
    });
  }

  document.querySelectorAll('input, select, textarea').forEach(element => {
    element.addEventListener('input', updatePrompt);
  });

  // Initial build
  updatePrompt();
</script>

</body>
</html>
